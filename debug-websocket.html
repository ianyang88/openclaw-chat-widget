<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw WebSocket 调试工具</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            margin: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: #4ec9b0;
            border-bottom: 2px solid #4ec9b0;
            padding-bottom: 10px;
        }
        .panel {
            background: #252526;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .panel h2 {
            margin-top: 0;
            color: #569cd6;
            font-size: 16px;
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .status.connected {
            background: #4ec9b0;
            color: #1e1e1e;
        }
        .status.disconnected {
            background: #f48771;
            color: #1e1e1e;
        }
        .status.connecting {
            background: #dcdcaa;
            color: #1e1e1e;
        }
        .log-container {
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            padding: 10px;
            height: 600px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.4;
        }
        .log-entry {
            margin-bottom: 8px;
            padding: 6px;
            border-left: 3px solid #3e3e42;
            background: #2d2d30;
        }
        .log-entry.sent {
            border-left-color: #4ec9b0;
        }
        .log-entry.received {
            border-left-color: #569cd6;
        }
        .log-entry.error {
            border-left-color: #f48771;
        }
        .log-entry.system {
            border-left-color: #dcdcaa;
        }
        .log-time {
            color: #858585;
            font-size: 11px;
        }
        .log-type {
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            margin-right: 8px;
        }
        .log-type.sent {
            background: #4ec9b0;
            color: #1e1e1e;
        }
        .log-type.received {
            background: #569cd6;
            color: #1e1e1e;
        }
        .log-type.error {
            background: #f48771;
            color: #1e1e1e;
        }
        .log-type.system {
            background: #dcdcaa;
            color: #1e1e1e;
        }
        .log-content {
            white-space: pre-wrap;
            word-break: break-all;
        }
        .json-key {
            color: #9cdcfe;
        }
        .json-string {
            color: #ce9178;
        }
        .json-number {
            color: #b5cea8;
        }
        .json-boolean {
            color: #569cd6;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        button:hover {
            background: #1177bb;
        }
        button:disabled {
            background: #3e3e42;
            cursor: not-allowed;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }
        .stat-box {
            background: #2d2d30;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #4ec9b0;
        }
        .stat-label {
            font-size: 11px;
            color: #858585;
            margin-top: 4px;
        }
        .message-detail {
            margin-top: 5px;
            padding: 8px;
            background: #1e1e1e;
            border-radius: 3px;
            font-size: 12px;
        }
        .message-detail strong {
            color: #569cd6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 OpenClaw WebSocket 协议调试工具</h1>

        <div class="panel">
            <h2>连接状态</h2>
            <div style="margin-bottom: 15px;">
                状态: <span id="connectionStatus" class="status disconnected">未连接</span>
            </div>
            <div class="controls">
                <button id="connectBtn" onclick="connect()">连接</button>
                <button id="disconnectBtn" onclick="disconnect()" disabled>断开</button>
                <button id="clearBtn" onclick="clearLogs()">清空日志</button>
                <button onclick="sendTestMessage()">发送测试消息</button>
            </div>
        </div>

        <div class="panel">
            <h2>消息统计</h2>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-value" id="sentCount">0</div>
                    <div class="stat-label">发送消息</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="receivedCount">0</div>
                    <div class="stat-label">接收消息</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="chatMessageCount">0</div>
                    <div class="stat-label">聊天消息数</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="finalMessageCount">0</div>
                    <div class="stat-label">Final 消息数</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>消息日志</h2>
            <div id="logContainer" class="log-container"></div>
        </div>
    </div>

    <script>
        const GATEWAY_URL = 'ws://localhost:18789';
        const TOKEN = '9aaa42a43ece4943693100cdbdb68281bfe3c3f43bbff5c5';

        let ws = null;
        let messageId = 0;
        let connectNonce = null;
        let sentCount = 0;
        let receivedCount = 0;
        let chatMessageCount = 0;
        let finalMessageCount = 0;

        function updateStatus(status) {
            const statusEl = document.getElementById('connectionStatus');
            statusEl.className = `status ${status}`;
            statusEl.textContent = status === 'connected' ? '已连接' :
                                  status === 'connecting' ? '连接中' : '未连接';

            document.getElementById('connectBtn').disabled = status === 'connected' || status === 'connecting';
            document.getElementById('disconnectBtn').disabled = status !== 'connected';
        }

        function updateStats() {
            document.getElementById('sentCount').textContent = sentCount;
            document.getElementById('receivedCount').textContent = receivedCount;
            document.getElementById('chatMessageCount').textContent = chatMessageCount;
            document.getElementById('finalMessageCount').textContent = finalMessageCount;
        }

        function addLog(type, content, extra = null) {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;

            const time = new Date().toLocaleTimeString();
            const typeLabel = type === 'sent' ? '→ 发送' :
                             type === 'received' ? '← 接收' :
                             type === 'error' ? '✗ 错误' : '● 系统';

            let html = `
                <div class="log-time">${time}</div>
                <span class="log-type ${type}">${typeLabel}</span>
                <div class="log-content">${JSON.stringify(content, null, 2)}</div>
            `;

            if (extra) {
                html += `<div class="message-detail">${extra}</div>`;
            }

            entry.innerHTML = html;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        function clearLogs() {
            document.getElementById('logContainer').innerHTML = '';
            sentCount = 0;
            receivedCount = 0;
            chatMessageCount = 0;
            finalMessageCount = 0;
            updateStats();
        }

        function connect() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                return;
            }

            updateStatus('connecting');
            addLog('system', '正在连接到 OpenClaw Gateway...');

            try {
                ws = new WebSocket(GATEWAY_URL);

                ws.onopen = () => {
                    addLog('system', 'WebSocket 连接已建立，等待 challenge...');
                };

                ws.onmessage = (event) => {
                    receivedCount++;
                    updateStats();

                    try {
                        const message = JSON.parse(event.data);
                        handleMessage(message);
                    } catch (e) {
                        addLog('error', { error: 'Failed to parse message', data: event.data });
                    }
                };

                ws.onerror = (error) => {
                    addLog('error', { error: 'WebSocket error', details: error });
                    updateStatus('disconnected');
                };

                ws.onclose = () => {
                    addLog('system', 'WebSocket 连接已关闭');
                    updateStatus('disconnected');
                };

            } catch (e) {
                addLog('error', { error: 'Failed to create WebSocket', details: e.message });
                updateStatus('disconnected');
            }
        }

        function handleMessage(message) {
            // 处理 Gateway 事件
            if (message.type === 'event') {
                handleGatewayEvent(message.event, message.payload);
            } else if (message.type === 'res') {
                handleResponse(message);
            } else {
                addLog('received', message);
            }
        }

        function handleGatewayEvent(event, payload) {
            addLog('received', { event, payload });

            if (event === 'connect.challenge') {
                connectNonce = payload?.nonce;
                addLog('system', `收到 challenge，nonce: ${connectNonce}`);
                sendConnect();
            } else if (event === 'connect.ok') {
                addLog('system', '✅ 认证成功！');
                updateStatus('connected');
            } else if (event === 'chat') {
                handleChatEvent(payload);
            } else if (event === 'tool') {
                addLog('system', `🔧 工具调用: ${JSON.stringify(payload)}`);
            }
        }

        function handleResponse(message) {
            addLog('received', message);

            if (message.ok && message.payload) {
                const { runId, status } = message.payload;
                if (runId && status) {
                    addLog('system', `响应: runId=${runId}, status=${status}`);
                }
            }
        }

        function handleChatEvent(params) {
            const { state, message, runId, seq } = params;

            chatMessageCount++;
            if (state === 'final') {
                finalMessageCount++;
            }
            updateStats();

            let extra = `<strong>状态:</strong> ${state}`;
            if (runId) extra += `<br><strong>Run ID:</strong> ${runId}`;
            if (seq !== undefined) extra += `<br><strong>序列:</strong> ${seq}`;
            if (message) extra += `<br><strong>消息:</strong> ${JSON.stringify(message).substring(0, 100)}...`;

            addLog('received', params, extra);
        }

        function sendConnect() {
            if (!connectNonce) {
                addLog('error', { error: 'No nonce received' });
                return;
            }

            const connectMsg = {
                type: 'req',
                id: String(++messageId),
                method: 'connect',
                params: {
                    minProtocol: 3,
                    maxProtocol: 3,
                    client: {
                        id: 'webchat',
                        displayName: 'OpenClaw Debug Tool',
                        version: '1.0.0',
                        platform: 'web',
                        mode: 'webchat'
                    },
                    auth: { token: TOKEN },
                    scopes: ['operator.write', 'operator.admin']
                }
            };

            ws.send(JSON.stringify(connectMsg));
            sentCount++;
            updateStats();
            addLog('sent', connectMsg);
        }

        function sendTestMessage() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addLog('error', { error: 'Not connected' });
                return;
            }

            const testMessage = `测试消息 ${new Date().toLocaleTimeString()}`;
            const id = String(++messageId);
            const idempotencyKey = `debug_${Date.now()}`;

            const request = {
                type: 'req',
                id,
                method: 'chat.send',
                params: {
                    sessionKey: 'agent:main:main',
                    message: testMessage,
                    idempotencyKey
                }
            };

            ws.send(JSON.stringify(request));
            sentCount++;
            updateStats();
            addLog('sent', request, `<strong>测试消息:</strong> ${testMessage}`);
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        // 页面加载时自动连接
        window.onload = () => {
            addLog('system', `准备连接到: ${GATEWAY_URL}`);
            addLog('system', '点击"连接"按钮开始调试');
        };
    </script>
</body>
</html>
