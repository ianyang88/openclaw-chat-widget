<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 简单聊天</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .status {
            font-size: 12px;
            opacity: 0.9;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4444;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #00ff88;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            display: flex;
            margin-bottom: 16px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            background: #e9ecef;
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message-content {
            max-width: 70%;
            margin: 0 12px;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: white;
            border: 1px solid #e9ecef;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e9ecef;
        }

        .input-form {
            display: flex;
            gap: 12px;
        }

        .input-field {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-field:focus {
            border-color: #667eea;
        }

        .send-button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing-indicator {
            padding: 12px 16px;
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            display: inline-block;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .debug-info {
            font-size: 11px;
            color: #6c757d;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 4px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🦀 OpenClaw Chat</h1>
            <div class="status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">连接中...</span>
            </div>
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-area">
            <form class="input-form" id="chatForm">
                <input
                    type="text"
                    class="input-field"
                    id="messageInput"
                    placeholder="输入消息..."
                    autocomplete="off"
                />
                <button type="submit" class="send-button" id="sendButton" disabled>
                    发送
                </button>
            </form>
        </div>
    </div>

    <script>
        // 配置
        const CONFIG = {
            gatewayUrl: 'ws://localhost:18789',
            token: '9aaa42a43ece4943693100cdbdb68281bfe3c3f43bbff5c5',
            sessionKey: 'agent:main:main'
        };

        // 状态
        let ws = null;
        let connected = false;
        let messageId = 0;
        let currentRunId = null;

        // DOM 元素
        const elements = {
            messages: document.getElementById('messages'),
            statusDot: document.getElementById('statusDot'),
            statusText: document.getElementById('statusText'),
            form: document.getElementById('chatForm'),
            input: document.getElementById('messageInput'),
            button: document.getElementById('sendButton')
        };

        // 初始化
        function init() {
            addMessage('assistant', '你好！我是 OpenClaw AI 助手。正在连接服务器...');
            connect();

            elements.form.addEventListener('submit', handleSubmit);
        }

        // 连接 WebSocket
        function connect() {
            updateStatus('connecting', '连接中...');

            try {
                ws = new WebSocket(CONFIG.gatewayUrl);

                ws.onopen = handleOpen;
                ws.onmessage = handleMessage;
                ws.onerror = handleError;
                ws.onclose = handleClose;

            } catch (error) {
                console.error('连接错误:', error);
                updateStatus('disconnected', '连接失败');
            }
        }

        // 处理连接打开
        function handleOpen() {
            console.log('✅ WebSocket 已连接');
            console.log('等待 challenge...');
        }

        // 处理消息
        function handleMessage(event) {
            try {
                const data = JSON.parse(event.data);
                console.log('📥 收到消息:', data);

                // 处理 Gateway 事件
                if (data.type === 'event') {
                    handleGatewayEvent(data.event, data.payload);
                }
                // 处理响应
                else if (data.type === 'res') {
                    handleResponse(data);
                }

            } catch (error) {
                console.error('解析消息失败:', error);
            }
        }

        // 处理 Gateway 事件
        function handleGatewayEvent(event, payload) {
            console.log('🎯 Gateway 事件:', event, payload);

            switch (event) {
                case 'connect.challenge':
                    handleChallenge(payload);
                    break;
                case 'connect.ok':
                    handleConnectOk(payload);
                    break;
                case 'chat':
                    handleChatEvent(payload);
                    break;
                default:
                    console.log('未知事件:', event);
            }
        }

        // 处理 challenge
        function handleChallenge(payload) {
            console.log('🔐 收到 challenge');
            const nonce = payload?.nonce;
            if (!nonce) {
                console.error('缺少 nonce');
                return;
            }

            const connectMsg = {
                type: 'req',
                id: String(++messageId),
                method: 'connect',
                params: {
                    minProtocol: 3,
                    maxProtocol: 3,
                    client: {
                        id: 'simple-chat',
                        displayName: 'Simple Chat',
                        version: '1.0.0',
                        platform: 'web',
                        mode: 'webchat'
                    },
                    auth: { token: CONFIG.token },
                    scopes: ['operator.write', 'operator.admin']
                }
            };

            console.log('📤 发送认证消息...');
            ws.send(JSON.stringify(connectMsg));
        }

        // 处理连接成功
        function handleConnectOk(payload) {
            console.log('✅ 认证成功！');
            updateStatus('connected', '已连接');
            connected = true;

            // 清除初始消息
            const firstMessage = elements.messages.querySelector('.message');
            if (firstMessage && firstMessage.textContent.includes('正在连接')) {
                firstMessage.remove();
            }

            // 添加欢迎消息
            addMessage('assistant', '✅ 连接成功！现在可以开始对话了。');
        }

        // 处理响应
        function handleResponse(data) {
            console.log('📨 响应:', data);
        }

        // 处理聊天事件
        function handleChatEvent(params) {
            const { state, message, runId, seq } = params;
            console.log('💬 聊天事件:', { state, message, runId, seq });

            if (state === 'final' && message) {
                removeTypingIndicator();
                addMessage('assistant', message);
                currentRunId = null;
            } else if (state === 'started' || state === 'in_flight') {
                showTypingIndicator();
                currentRunId = runId;
            }
        }

        // 处理表单提交
        function handleSubmit(e) {
            e.preventDefault();
            sendMessage();
        }

        // 发送消息
        function sendMessage() {
            const text = elements.input.value.trim();
            if (!text || !connected) return;

            // 显示用户消息
            addMessage('user', text);
            elements.input.value = '';

            // 显示输入指示器
            showTypingIndicator();

            // 发送消息
            const request = {
                type: 'req',
                id: String(++messageId),
                method: 'chat.send',
                params: {
                    sessionKey: CONFIG.sessionKey,
                    message: text,
                    idempotencyKey: `msg_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`
                }
            };

            console.log('📤 发送消息:', text);
            ws.send(JSON.stringify(request));
        }

        // 添加消息
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = role === 'assistant' ? '🦀' : '👤';

            let displayContent = content;
            if (typeof content === 'object') {
                displayContent = JSON.stringify(content);
            }

            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
                    <div class="message-bubble">${escapeHtml(displayContent)}</div>
                </div>
            `;

            elements.messages.appendChild(messageDiv);
            elements.messages.scrollTop = elements.messages.scrollHeight;
        }

        // 显示输入指示器
        function showTypingIndicator() {
            removeTypingIndicator();

            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant typing';
            typingDiv.innerHTML = `
                <div class="message-avatar">🦀</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dots">
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                        </div>
                    </div>
                </div>
            `;

            elements.messages.appendChild(typingDiv);
            elements.messages.scrollTop = elements.messages.scrollHeight;
        }

        // 移除输入指示器
        function removeTypingIndicator() {
            const typing = elements.messages.querySelector('.typing');
            if (typing) typing.remove();
        }

        // 更新状态
        function updateStatus(status, text) {
            elements.statusText.textContent = text;
            elements.statusDot.className = 'status-dot';

            if (status === 'connected') {
                elements.statusDot.classList.add('connected');
                elements.button.disabled = false;
            } else {
                elements.button.disabled = true;
            }
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 处理错误
        function handleError(error) {
            console.error('❌ WebSocket 错误:', error);
            updateStatus('disconnected', '连接错误');
        }

        // 处理关闭
        function handleClose() {
            console.log('🔌 连接已关闭');
            updateStatus('disconnected', '已断开');
            connected = false;

            // 3秒后重连
            setTimeout(() => {
                console.log('🔄 尝试重连...');
                connect();
            }, 3000);
        }

        // 启动
        init();
    </script>
</body>
</html>
